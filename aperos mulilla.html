<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aperos Mulilla 70cm</title>
<style>
:root{
  --bg:#f0ede6;--surface:#fff;--dark:#1a2535;--mid:#5a6478;--light:#e2ddd4;
  --b1:#1e5a3a;--b2:#1a5a5a;--b3:#5a2a0a;--b4:#4a2a6a;
  --gold:#c89a2a;--gold-l:#f0c050;--done:#2a7a4a;--r:10px;
  --sh:0 2px 12px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}

/* HEADER */
header{background:var(--dark);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;max-width:1300px;margin:0 auto}
.logo{font-size:26px}
.hdr h1{font-size:16px;font-weight:800;color:#fff;line-height:1.2}
.hdr p{font-size:11px;color:#8a9ab0;margin-top:1px}
.base-tabs{background:var(--dark);border-top:1px solid rgba(255,255,255,.08);display:flex;overflow-x:auto;padding:0 16px;max-width:1300px;margin:0 auto;scrollbar-width:none}
.base-tabs::-webkit-scrollbar{display:none}
.btab{padding:9px 16px;border:none;background:transparent;color:#8a9ab0;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;flex-shrink:0}
.btab.active{color:#fff}
.btab.b1.active{border-bottom-color:var(--b1)}
.btab.b2.active{border-bottom-color:var(--b2)}
.btab.b3.active{border-bottom-color:var(--b3)}
.btab.b4.active{border-bottom-color:var(--b4)}
.btab.bs.active{border-bottom-color:var(--gold)}

/* LAYOUT */
.app{max-width:1300px;margin:0 auto;padding:16px;display:grid;grid-template-columns:280px 1fr;gap:16px}
@media(max-width:800px){.app{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px}
.base-card{border-radius:var(--r);padding:14px;color:#fff;box-shadow:var(--sh)}
.base-card h2{font-size:20px;font-weight:900}
.base-card .sub{font-size:11px;opacity:.8;margin-top:2px}
.bstats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.bst{background:rgba(255,255,255,.15);border-radius:6px;padding:7px;text-align:center}
.bst .v{font-size:17px;font-weight:800}
.bst .l{font-size:9px;opacity:.75;margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

.alist{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.alist-hdr{padding:10px 14px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mid);border-bottom:1px solid var(--light);display:flex;justify-content:space-between;align-items:center}
.chkall{font-size:11px;color:var(--gold);cursor:pointer;font-weight:700;border:none;background:none}
.aitem{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--light);transition:.15s;position:relative}
.aitem:last-child{border-bottom:none}
.aitem:hover{background:#f5f4f0}
.aitem.active{background:#f0faf4}
.aitem.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--b1));border-radius:0 3px 3px 0}
.achk{width:20px;height:20px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;background:#fff;font-size:11px;font-weight:800}
.achk.done{background:var(--done);border-color:var(--done);color:#fff}
.aname{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.anum{font-size:10px;font-weight:800;color:#fff;background:var(--ac,var(--b1));padding:2px 7px;border-radius:10px;flex-shrink:0}

/* MAIN */
.main{display:flex;flex-direction:column;gap:14px}

/* PROGRESS */
.prog-card{background:var(--surface);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh)}
.prog-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:7px;color:var(--mid)}
.prog-bar{height:8px;background:var(--light);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--b1),#2a9a6a);border-radius:4px;transition:.5s}

/* WELCOME */
.welcome{background:var(--surface);border-radius:var(--r);padding:40px 30px;text-align:center;box-shadow:var(--sh)}
.welcome .wi{font-size:52px;margin-bottom:14px}
.welcome h2{font-size:22px;font-weight:800;margin-bottom:8px}
.welcome p{color:var(--mid);font-size:14px;max-width:380px;margin:0 auto;line-height:1.6}

/* APERO CARD */
.acard{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.acard-hdr{padding:18px 22px;color:#fff;display:flex;align-items:flex-start;gap:12px}
.acard-hdr .ic{font-size:32px;flex-shrink:0}
.acard-hdr h2{font-size:20px;font-weight:900;margin-bottom:3px}
.acard-hdr .btag{display:inline-block;background:rgba(255,255,255,.2);padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;margin-right:6px}
.acard-hdr .dtag{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.d1{background:#e8f5e9;color:#1e6a38}
.d2{background:#fff8e1;color:#8a6a00}
.d3{background:#fbe9e7;color:#8a2a0a}
.chkbtn{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:800;font-size:13px;transition:.2s;white-space:nowrap}
.chkbtn.done{background:var(--done);border-color:var(--done)}

/* INNER TABS */
.itabs{display:flex;border-bottom:1px solid var(--light);background:#fafaf7;overflow-x:auto;scrollbar-width:none}
.itabs::-webkit-scrollbar{display:none}
.itab{padding:11px 16px;border:none;background:none;font-size:12px;font-weight:700;color:var(--mid);cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;flex-shrink:0}
.itab.active{color:var(--dark);border-bottom-color:var(--gold)}
.tcont{padding:20px}

/* INFO GRID */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
@media(max-width:600px){.igrid{grid-template-columns:1fr}}
.iblock{background:#f8f7f3;border-radius:8px;padding:13px;border-left:4px solid var(--gold)}
.iblock .il{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);margin-bottom:5px}
.iblock p{font-size:13px;line-height:1.55;color:var(--dark)}
.iblock .bignum{font-size:24px;font-weight:900;color:var(--b1)}

.slist{list-style:none;display:flex;flex-direction:column;gap:8px}
.slist li{display:flex;gap:10px;align-items:flex-start;background:#f8f7f3;border-radius:8px;padding:11px 13px}
.snum{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#111;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.slist li p{font-size:13px;line-height:1.5}

/* PLAN VIEWS */
.plan-views{display:flex;flex-direction:column;gap:12px}
.view-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.vtab{padding:6px 14px;border-radius:20px;border:2px solid var(--light);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;color:var(--mid)}
.vtab.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.plan-box{background:#fafaf7;border-radius:8px;padding:14px;border:1px solid var(--light);overflow:auto;text-align:center}
.plan-box svg{max-width:100%;height:auto;display:block;margin:0 auto}
.plan-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid)}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.plan-notes{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.pnote{display:flex;gap:8px;font-size:13px;color:var(--mid);background:#fffbe8;border-radius:6px;padding:8px 10px;border-left:3px solid var(--gold)}
.pnote::before{content:'⚑';color:var(--gold);flex-shrink:0}

/* SHOP */
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{background:var(--dark);color:#fff;padding:9px 11px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.stbl td{padding:8px 11px;border-bottom:1px solid var(--light)}
.stbl tr:nth-child(even) td{background:#fafaf8}
.stbl .pr{color:var(--b1);font-weight:800;text-align:right}
.stbl .qty{color:#8a3a0a;font-weight:700}
.stotal{margin-top:12px;background:var(--dark);color:#fff;border-radius:8px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.stotal .tl{font-size:13px;font-weight:600}
.stotal .tp{font-size:22px;font-weight:900;color:var(--gold-l)}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.sum-bcard{border-radius:var(--r);padding:16px;color:#fff;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.sum-bcard:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.18)}
.sum-bcard h3{font-size:18px;font-weight:900}
.sum-bcard .cnt{font-size:26px;font-weight:900;margin-top:8px}
.sum-bcard .cnt span{font-size:12px;font-weight:400;opacity:.8}
.alist2{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.sitem{background:var(--surface);border-radius:8px;padding:11px;box-shadow:var(--sh);display:flex;gap:9px;align-items:center;cursor:pointer;transition:.15s}
.sitem:hover{background:#f5f4f0}
.sc{width:22px;height:22px;border-radius:50%;background:#e0e0e0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.sc.done{background:var(--done);color:#fff}
.sn{font-size:12px;font-weight:700;line-height:1.3}
.sb{font-size:10px;margin-top:1px}

.tip{background:#fffbe8;border:1px solid #f0d060;border-radius:8px;padding:11px 13px;font-size:13px;display:flex;gap:9px;align-items:flex-start;margin-top:10px}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <div class="logo">🚜</div>
    <div>
      <h1>Sistema de Aperos — Mulilla 70 cm</h1>
      <p>4 bases · 15 aperos · Planos con múltiples vistas</p>
    </div>
  </div>
  <div style="max-width:1300px;margin:0 auto">
    <div class="base-tabs">
      <button class="btab b1 active" onclick="switchBase(0)">🌱 Base 1 · Suelo+Ajos</button>
      <button class="btab b2" onclick="switchBase(1)">🧹 Base 2 · Acabado</button>
      <button class="btab b3" onclick="switchBase(2)">⚙️ Base 3 · Peso</button>
      <button class="btab b4" onclick="switchBase(3)">🪑 Base 4 · Sulky</button>
      <button class="btab bs" onclick="switchBase(4)">📋 Resumen</button>
    </div>
  </div>
</header>

<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const BASES=[
  {id:'b1',name:'Base 1',label:'Porta-aperos universal',color:'#1e5a3a',aperos:9,cost:'130-155 €',time:'2-3 tardes',desc:'La base principal. Barra 70cm con 5 puntos de anclaje. Cubre el 60% de todas las labores.'},
  {id:'b2',name:'Base 2',label:'Bastidor frontal ligero',color:'#1a5a5a',aperos:3,cost:'60-75 €',time:'1,5 tardes',desc:'Marco rectangular 65×20cm. Solo 4kg vacío. Para limpieza y acabado del suelo.'},
  {id:'b3',name:'Base 3',label:'Bastidor con ruedas',color:'#5a2a0a',aperos:2,cost:'125-145 €',time:'2 tardes',desc:'Chasis ruedas R13 eje Ø30mm. Hasta 200kg carga. Para rodillo y esparcidor.'},
  {id:'b4',name:'Base 4',label:'Asiento sulky',color:'#4a2a6a',aperos:1,cost:'40-50 €',time:'1 tarde',desc:'Se engancha a cualquier base en 30 segundos sin herramientas.'},
];

// SVG colors
const C={dark:'#1a2535',blue:'#1e5a3a',teal:'#1a5a5a',steel:'#6a8090',steell:'#9ab0c0',gnd:'#8a6a45',gndl:'#c3a06e',yel:'#c89a2a',red:'#a03030',dim:'#a02828',wh:'white'};

// ── SVG HELPERS ──
const A=`<defs><marker id="arr" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="${C.dim}"/></marker></defs>`;
const gnd=(x,y,w,h=28)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${C.gndl}" stroke="${C.gnd}" stroke-width="1.5"/>
  ${Array.from({length:Math.floor(w/12)},(_,i)=>`<line x1="${x+i*12}" y1="${y}" x2="${x+i*12-14}" y2="${y+h}" stroke="${C.gnd}" stroke-width=".8" opacity=".5"/>`).join('')}`;
const lbl=(x,y,t,bg=C.blue)=>{const ls=t.split('\n');const w=ls.reduce((a,l)=>Math.max(a,l.length*6.2),0);const h=ls.length*15+8;return `<rect x="${x-4}" y="${y-4}" width="${w+8}" height="${h}" fill="${bg}" rx="3" opacity=".95"/>${ls.map((l,i)=>`<text x="${x}" y="${y+10+i*15}" font-size="10.5" fill="white">${l}</text>`).join('')}`;};
const dh=(x1,x2,y,t,s='top')=>`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${C.dim}" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/><text x="${(x1+x2)/2}" y="${y+(s==='top'?-6:12)}" font-size="10" fill="${C.dim}" text-anchor="middle" font-weight="700">${t}</text>`;
const dv=(x,y1,y2,t,s='left')=>`<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${C.dim}" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/><text x="${x+(s==='left'?-5:5)}" y="${(y1+y2)/2+4}" font-size="10" fill="${C.dim}" text-anchor="${s==='left'?'end':'start'}" font-weight="700">${t}</text>`;
const wrap=(content,w=760,h=420)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#fafaf8" rx="6"/>${A}${content}</svg>`;
const hdr=(t,sub)=>`<text x="380" y="20" font-size="12.5" fill="${C.dark}" text-anchor="middle" font-weight="800">${t}</text><text x="380" y="34" font-size="10" fill="#6a7a8a" text-anchor="middle">${sub}</text>`;
const note=(t,y)=>`<rect x="30" y="${y}" width="700" height="26" fill="#fffbe8" stroke="#e0c040" stroke-width="1" rx="4"/><text x="44" y="${y+17}" font-size="10" fill="#6a4000">⚑ ${t}</text>`;

// ── CULTIVADOR VIEWS ──
function cultFrontal(){return wrap(`${hdr('CULTIVADOR DE GANCHOS','Vista frontal · 3 dientes · Ancho 45 cm')}
  <rect x="310" y="44" width="140" height="20" fill="${C.steel}" stroke="${C.dark}" stroke-width="1.5" rx="2"/>
  <circle cx="335" cy="54" r="5" fill="${C.dark}"/><circle cx="425" cy="54" r="5" fill="${C.dark}"/>
  ${lbl(260,38,'Rastra enganche\nØ18mm × 2')}
  <rect x="140" y="90" width="480" height="20" fill="${C.steel}" stroke="${C.dark}" stroke-width="2" rx="2"/>
  <text x="380" y="103" font-size="9.5" fill="white" text-anchor="middle">Barra 45cm · 40×30×2mm</text>
  ${[190,330,470].map(tx=>`
    <rect x="${tx-8}" y="110" width="16" height="20" fill="#2a6a4a" stroke="${C.dark}" stroke-width="1.5"/>
    <path d="M${tx},130 C${tx-1},170 ${tx-8},208 ${tx-20},245 ${tx-24},270 ${tx-27},295" fill="none" stroke="${C.steel}" stroke-width="12"/>
    <path d="M${tx},130 C${tx-1},170 ${tx-8},208 ${tx-20},245 ${tx-24},270 ${tx-27},295" fill="none" stroke="${C.dark}" stroke-width="1.5"/>
    <path d="M${tx-27},295 C${tx-35},315 ${tx-26},328 ${tx-12},325" fill="none" stroke="${C.steel}" stroke-width="12"/>
    <path d="M${tx-27},295 C${tx-35},315 ${tx-26},328 ${tx-12},325" fill="none" stroke="${C.dark}" stroke-width="1.5"/>
    <circle cx="${tx-22}" cy="322" r="5" fill="${C.dark}"/>
    <line x1="${tx-20}" y1="326" x2="${tx-18}" y2="370" stroke="#9a8060" stroke-width="1"/>
  `).join('')}
  ${gnd(80,370,600)}
  ${dh(140,620,74,'45 cm')}
  <line x1="140" y1="74" x2="140" y2="90" stroke="${C.dim}" stroke-width="1"/>
  <line x1="620" y1="74" x2="620" y2="90" stroke="${C.dim}" stroke-width="1"/>
  ${dh(190,330,78,'14 cm sep.')}
  ${dv(118,130,295,'16.5cm','left')}
  <line x1="118" y1="130" x2="140" y2="130" stroke="${C.dim}" stroke-width="1"/>
  <line x1="118" y1="295" x2="163" y2="295" stroke="${C.dim}" stroke-width="1"/>
  ${lbl(635,130,'Grapa M8\n×3 total')}
  ${lbl(635,220,'Diente Ø12mm\nmuelle 65Mn\nL=320mm')}
  ${lbl(635,305,'Gancho tip\nacero duro')}
  ${note('Varilla muelle 65Mn: cede al golpear piedras sin romperse',400)}
`);}

function cultLateral(){return wrap(`${hdr('CULTIVADOR — Vista lateral','Perfil del diente curvado y profundidad de trabajo')}
  <rect x="290" y="44" width="180" height="20" fill="${C.steel}" stroke="${C.dark}" stroke-width="1.5" rx="2"/>
  <rect x="348" y="64" width="64" height="44" fill="${C.steel}" stroke="${C.dark}" stroke-width="1.5"/>
  <rect x="356" y="108" width="48" height="20" fill="#2a6a4a" stroke="${C.dark}" stroke-width="1.5"/>
  <path d="M380,128 C378,168 370,205 360,245 352,275 350,300 352,320" fill="none" stroke="${C.steel}" stroke-width="18"/>
  <path d="M380,128 C378,168 370,205 360,245 352,275 350,300 352,320" fill="none" stroke="${C.dark}" stroke-width="2"/>
  <path d="M352,320 C344,338 352,352 368,348" fill="none" stroke="${C.steel}" stroke-width="18"/>
  <path d="M352,320 C344,338 352,352 368,348" fill="none" stroke="${C.dark}" stroke-width="2"/>
  <circle cx="358" cy="345" r="7" fill="${C.dark}"/>
  ${gnd(80,375,600)}
  <line x1="360" y1="345" x2="362" y2="375" stroke="#9a8060" stroke-width="2"/>
  <line x1="80" y1="345" x2="680" y2="345" stroke="${C.dim}" stroke-width="1" stroke-dasharray="5,4" opacity=".5"/>
  <text x="90" y="338" font-size="9.5" fill="${C.dim}">Profundidad trabajo</text>
  ${dv(100,108,345,'23cm','left')}
  <line x1="100" y1="108" x2="356" y2="108" stroke="${C.dim}" stroke-width="1"/>
  <line x1="100" y1="345" x2="344" y2="345" stroke="${C.dim}" stroke-width="1"/>
  <rect x="430" y="108" width="200" height="220" fill="white" stroke="#2a6a4a" stroke-width="1.5" rx="5"/>
  <rect x="430" y="108" width="200" height="20" fill="#2a6a4a" rx="5"/>
  <text x="530" y="122" font-size="10" fill="white" text-anchor="middle">PERFIL DIENTE</text>
  <path d="M530,148 C528,188 520,222 508,255 500,278 498,295 500,312" fill="none" stroke="${C.steel}" stroke-width="14"/>
  <path d="M530,148 C528,188 520,222 508,255 500,278 498,295 500,312" fill="none" stroke="${C.dark}" stroke-width="1.5"/>
  <path d="M500,312 C492,328 500,340 514,336" fill="none" stroke="${C.steel}" stroke-width="14"/>
  <circle cx="506" cy="334" r="6" fill="${C.dark}"/>
  <text x="524" y="160" font-size="9" fill="${C.dark}">① Eje recto</text>
  <text x="524" y="230" font-size="9" fill="${C.dark}">② Curva</text>
  <text x="524" y="310" font-size="9" fill="${C.dark}">③ Gancho</text>
  <line x1="524" y1="160" x2="530" y2="155" stroke="${C.dim}" stroke-width="1"/>
  <line x1="524" y1="230" x2="515" y2="235" stroke="${C.dim}" stroke-width="1"/>
  <line x1="524" y1="310" x2="510" y2="318" stroke="${C.dim}" stroke-width="1"/>
  ${note('El gancho final engancha la hierba. Sin gancho solo la empuja.',400)}
`);}

function cultDetalle(){return wrap(`${hdr('CULTIVADOR — Detalle de piezas y ensamblaje','Grapa de sujeción + pasador + medidas exactas')}
  <text x="200" y="55" font-size="12" fill="${C.dark}" text-anchor="middle" font-weight="800">GRAPA SUJECIÓN</text>

   views:[{label:'Vista lateral',svg:()=>genericFrontal('ASIENTO SULKY UNIVERSAL','Compatible con BASE 1, 2 y 3 · Sin herramientas',`

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S={activeBase:0,activeApero:null,activeTab:'info',activeView:0,checked:JSON.parse(localStorage.getItem('mc')||'{}')};
const save=()=>localStorage.setItem('mc',JSON.stringify(S.checked));

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function checkedCount(){return APEROS.filter(a=>S.checked[a.id]).length;}

function renderSidebar(){
  const el=document.getElementById('sidebar');
  if(S.activeBase===4){el.innerHTML='';return;}
  const b=BASES[S.activeBase];
  const ba=APEROS.filter(a=>a.base===S.activeBase);
  const bc=ba.filter(a=>S.checked[a.id]).length;
  el.innerHTML=`
    <div class="base-card" style="background:${b.color}">
      <h2>${b.name}</h2><div class="sub">${b.label}</div>
      <div class="bstats">
        <div class="bst"><div class="v">${b.aperos}</div><div class="l">Aperos</div></div>
        <div class="bst"><div class="v">${b.cost}</div><div class="l">Coste total</div></div>
        <div class="bst"><div class="v">${b.time}</div><div class="l">Fabricación</div></div>
        <div class="bst"><div class="v">${bc}/${b.aperos}</div><div class="l">Hechos ✓</div></div>
      </div>
    </div>
    <div class="alist">
      <div class="alist-hdr"><span>Aperos de esta base</span>
        <button class="chkall" onclick="toggleAll(${S.activeBase})">Marcar todos</button>
      </div>
      ${ba.map(ap=>`
        <div class="aitem ${S.activeApero===ap.id?'active':''}" onclick="selApero(${ap.id})" style="--ac:${b.color}">
          <div class="achk ${S.checked[ap.id]?'done':''}" onclick="event.stopPropagation();toggleChk(${ap.id})">${S.checked[ap.id]?'✓':''}</div>
          <span class="aname">${ap.icon} ${ap.name}</span>
          <span class="anum" style="background:${b.color}">${ap.id}</span>
        </div>`).join('')}
    </div>`;
}

function renderProg(){
  const t=APEROS.length,d=checkedCount(),p=Math.round(d/t*100);
  return `<div class="prog-card">
    <div class="prog-label"><span>📊 Progreso total del sistema</span><span>${d}/${t} aperos (${p}%)</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div>
  </div>`;}

function renderMain(){
  const el=document.getElementById('main');
  const prog=renderProg();
  if(S.activeBase===4){
    const t=APEROS.length,d=checkedCount();
    el.innerHTML=prog+`<div class="acard">
      <div class="acard-hdr" style="background:#1a2535">
        <div class="ic">📋</div>
        <div><h2>Resumen del sistema</h2><span class="btag">4 bases · 15 aperos</span></div>
      </div>
      <div style="padding:20px">
        <div class="sum-grid">
          ${BASES.map((b,i)=>{const ba=APEROS.filter(a=>a.base===i);const bc=ba.filter(a=>S.checked[a.id]).length;return`
            <div class="sum-bcard" style="background:${b.color}" onclick="switchBase(${i})">
              <h3>${b.name}</h3><div style="font-size:11px;opacity:.8;margin-top:2px">${b.label}</div>
              <div class="cnt">${bc}/${b.aperos} <span>fabricados</span></div>
              <div style="font-size:11px;opacity:.75;margin-top:4px">${b.cost}</div>
            </div>`;}).join('')}
        </div>
        <div style="font-size:12px;font-weight:800;margin:14px 0 10px;color:var(--mid);text-transform:uppercase;letter-spacing:.6px">Todos los aperos</div>
        <div class="alist2">
          ${APEROS.map(ap=>{const b=BASES[ap.base];return`
            <div class="sitem" onclick="switchBase(${ap.base});selApero(${ap.id})">
              <div class="sc ${S.checked[ap.id]?'done':''}">${S.checked[ap.id]?'✓':ap.id}</div>
              <div><div class="sn">${ap.icon} ${ap.name}</div><div class="sb" style="color:${b.color}">${b.name}</div></div>
            </div>`;}).join('')}
        </div>
      </div>
    </div>`;
    return;
  }
  if(!S.activeApero){
    const b=BASES[S.activeBase];
    el.innerHTML=prog+`<div class="welcome"><div class="wi">👈</div>
      <h2>${b.name} — ${b.label}</h2>
      <p>${b.desc}<br><br>Selecciona un apero de la lista para ver su plano detallado con múltiples vistas, instrucciones de uso y lista de la compra exacta.</p>
    </div>`;
    return;
  }
  const ap=APEROS.find(a=>a.id===S.activeApero);
  const b=BASES[ap.base];
  const difs=['','★☆☆☆ Fácil','★★☆☆ Medio','★★★☆ Avanzado'];
  const dtags=['','d1','d2','d3'];
  el.innerHTML=prog+`
    <div class="acard">
      <div class="acard-hdr" style="background:${b.color}">
        <div class="ic">${ap.icon}</div>
        <div>
          <h2>Apero ${ap.id} — ${ap.name}</h2>
          <span class="btag">${b.name} · ${b.label}</span>
          <span class="dtag ${dtags[ap.dif]}">${difs[ap.dif]}</span>
        </div>
        <button class="chkbtn ${S.checked[ap.id]?'done':''}" onclick="toggleChk(${ap.id})">
          ${S.checked[ap.id]?'✓ Fabricado':'Marcar fabricado'}
        </button>
      </div>
      <div class="itabs">
        ${['info','plano','compra'].map(t=>`
          <button class="itab ${S.activeTab===t?'active':''}" onclick="setTab('${t}')">
            ${{info:'📖 Información',plano:'📐 Planos',compra:'🛒 Lista compra'}[t]}
          </button>`).join('')}
      </div>
      <div class="tcont" id="tc"></div>
    </div>`;
  renderTab(ap,b);
}

function renderTab(ap,b){
  const el=document.getElementById('tc');
  if(!el)return;
  if(S.activeTab==='info'){
    el.innerHTML=`
      <div class="igrid">
        <div class="iblock"><div class="il">Para qué sirve</div><p>${ap.uso}</p></div>
        <div class="iblock"><div class="il">Cuándo usarlo</div><p>${ap.cuando}</p></div>
        <div class="iblock"><div class="il">Cultivos ideales</div><p>${ap.cultivos}</p></div>
        <div class="iblock"><div class="il">Coste fabricación</div><p class="bignum">${ap.cost}</p></div>
      </div>
      <div style="font-size:13px;font-weight:800;margin-bottom:10px">Cómo usarlo paso a paso:</div>
      <ul class="slist">${ap.como.map((s,i)=>`<li><div class="snum">${i+1}</div><p>${s}</p></li>`).join('')}</ul>
      ${ap.notes.map(n=>`<div class="tip" style="margin-top:8px"><span style="font-size:16px">⚑</span><span>${n}</span></div>`).join('')}`;
  } else if(S.activeTab==='plano'){
    const views=ap.views;
    el.innerHTML=`
      <div class="plan-views">
        <div class="view-tabs">
          ${views.map((v,i)=>`<button class="vtab ${S.activeView===i?'active':''}" onclick="setView(${i})">${v.label}</button>`).join('')}
        </div>
        <div class="plan-box" id="planBox">${views[S.activeView].svg()}</div>
        <div class="plan-legend">
          <div class="leg-item"><div class="leg-dot" style="background:#1e5a3a"></div>Estructura acero S235</div>
          <div class="leg-item"><div class="leg-dot" style="background:#6a8090"></div>Piezas de acero</div>
          <div class="leg-item"><div class="leg-dot" style="background:#c89a2a"></div>Elementos de unión</div>
          <div class="leg-item"><div class="leg-dot" style="background:#a02828"></div>Cotas y medidas</div>
          <div class="leg-item"><div class="leg-dot" style="background:#c3a06e"></div>Suelo/tierra</div>
        </div>
        <div class="plan-notes">
          ${ap.notes.map(n=>`<div class="pnote">${n}</div>`).join('')}
        </div>
        <div class="tip"><span style="font-size:16px">💡</span><span>Las medidas exactas de cada pieza están en la pestaña <strong>Lista de compra</strong>.</span></div>
      </div>`;
  } else {
    let total=0;ap.shop.forEach(r=>{const m=r[2].match(/~([\d,]+)/);if(m)total+=parseFloat(m[1].replace(',','.'));});
    el.innerHTML=`
      <table class="stbl">
        <thead><tr><th>Material / Pieza</th><th>Cantidad</th><th class="pr">Precio</th><th>Dónde</th></tr></thead>
        <tbody>${ap.shop.map(r=>`<tr><td>${r[0]}</td><td class="qty">${r[1]}</td><td class="pr">${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</tbody>
      </table>
      <div class="stotal"><div class="tl">💰 Total estimado este apero</div><div class="tp">${ap.cost}</div></div>
      <div class="tip" style="margin-top:12px"><span style="font-size:16px">💡</span><span>Almacén de acero: hasta 40% más barato que ferretería. Pasadores Ø16mm: comprar en lote de 20 en tornillería industrial (~0,50€/ud).</span></div>`;
  }
}

// ═══════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════
function switchBase(i){
  S.activeBase=i;S.activeApero=null;S.activeTab='info';S.activeView=0;
  document.querySelectorAll('.btab').forEach((t,j)=>t.classList.toggle('active',j===i));
  renderSidebar();renderMain();
}
function selApero(id){S.activeApero=id;S.activeTab='info';S.activeView=0;renderSidebar();renderMain();}
function setTab(t){S.activeTab=t;S.activeView=0;const ap=APEROS.find(a=>a.id===S.activeApero);renderTab(ap,BASES[ap.base]);document.querySelectorAll('.itab').forEach(el=>el.classList.toggle('active',el.textContent.includes({info:'Infor',plano:'Plano',compra:'compra'}[t])));}
function setView(i){S.activeView=i;const ap=APEROS.find(a=>a.id===S.activeApero);document.querySelectorAll('.vtab').forEach((b,j)=>b.classList.toggle('active',j===i));document.getElementById('planBox').innerHTML=ap.views[i].svg();}
function toggleChk(id){S.checked[id]=!S.checked[id];save();renderSidebar();renderMain();}
function toggleAll(bi){const ba=APEROS.filter(a=>a.base===bi);const all=ba.every(a=>S.checked[a.id]);ba.forEach(a=>{S.checked[a.id]=!all;});save();renderSidebar();renderMain();}

// INIT
renderSidebar();renderMain();
</script>
</body>
</html>
