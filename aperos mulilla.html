<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aperos Mulilla 70cm - Sistema Completo</title>
<style>
:root{--bg:#f0ede6;--sf:#fff;--dk:#1a2535;--md:#5a6478;--lt:#e2ddd4;
  --b1:#1e5a3a;--b2:#1a5a5a;--b3:#5a2a0a;--b4:#4a2a6a;
  --gd:#c89a2a;--gl:#f0c050;--dn:#2a7a4a;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--dk);line-height:1.5}
header{background:var(--dk);position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr{display:flex;align-items:center;gap:16px;padding:12px 20px;max-width:1400px;margin:0 auto}
.hdr h1{font-size:18px;font-weight:900;color:#fff;line-height:1.2}
.hdr p{font-size:11px;color:#8a9ab0;margin-top:2px}
.btabs{background:var(--dk);border-top:1px solid rgba(255,255,255,.1);display:flex;overflow-x:auto;padding:0 20px;max-width:1400px;margin:0 auto;scrollbar-width:none}
.btabs::-webkit-scrollbar{display:none}
.btab{padding:10px 15px;border:none;background:transparent;color:#8a9ab0;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;flex-shrink:0}
.btab.active{color:#fff}
.btab.t0.active{border-bottom-color:var(--b1)}.btab.t1.active{border-bottom-color:var(--b2)}.btab.t2.active{border-bottom-color:var(--b3)}.btab.t3.active{border-bottom-color:var(--b4)}.btab.t4.active{border-bottom-color:var(--gd)}.btab.t5.active{border-bottom-color:#888}
.app{max-width:1400px;margin:0 auto;padding:16px 20px;display:grid;grid-template-columns:280px 1fr;gap:16px}
@media(max-width:900px){.app{grid-template-columns:1fr}}
.sidebar{display:flex;flex-direction:column;gap:12px}
.bcard{border-radius:var(--r);padding:15px;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.bcard h2{font-size:19px;font-weight:900;margin-bottom:2px}.bcard .sub{font-size:11px;opacity:.85}
.bstats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.bst{background:rgba(255,255,255,.15);border-radius:6px;padding:8px;text-align:center}
.bst .v{font-size:16px;font-weight:800}.bst .l{font-size:8.5px;opacity:.75;text-transform:uppercase;letter-spacing:.5px}
.alist{background:var(--sf);border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.12);overflow:hidden}
.alhdr{padding:10px 13px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--md);border-bottom:1px solid var(--lt);display:flex;justify-content:space-between}
.ai{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--lt);transition:.15s;position:relative}
.ai:hover{background:#f5f4f0}.ai.active{background:#f0faf4}
.ai.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--b1));border-radius:0 3px 3px 0}
.achk{width:20px;height:20px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;background:#fff;font-size:11px;font-weight:800}
.achk.done{background:var(--dn);border-color:var(--dn);color:#fff}
.an{flex:1;font-size:13px;font-weight:600}.anum{font-size:10px;font-weight:800;color:#fff;background:var(--ac,var(--b1));padding:2px 6px;border-radius:9px;flex-shrink:0}
.main{display:flex;flex-direction:column;gap:14px}
.pgc{background:var(--sf);border-radius:var(--r);padding:12px 16px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.pgl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--md)}
.pgb{height:8px;background:var(--lt);border-radius:4px;overflow:hidden}
.pgf{height:100%;background:linear-gradient(90deg,#2a9a6a,#1e7a4a);border-radius:4px;transition:.5s}
.welcome{background:var(--sf);border-radius:var(--r);padding:40px 30px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.welcome .wi{font-size:52px;margin-bottom:14px}.welcome h2{font-size:22px;font-weight:800;margin-bottom:8px}
.welcome p{color:var(--md);font-size:13px;max-width:420px;margin:0 auto;line-height:1.7}
.acard{background:var(--sf);border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.12);overflow:hidden}
.achdr{padding:16px 20px;color:#fff;display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
.achdr-left{display:flex;gap:12px;align-items:flex-start;flex:1}
.achdr .ic{font-size:32px;flex-shrink:0}.achdr h2{font-size:19px;font-weight:900;margin-bottom:4px}
.achdr-right{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.btag{display:inline-block;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px;margin-bottom:4px}
.dtag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.d1{background:#e8f5e9;color:#1e6a38}.d2{background:#fff8e1;color:#8a6a00}.d3{background:#fbe9e7;color:#8a2a0a}
.btn{padding:8px 13px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:11px;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-primary{background:#1e5a3a;color:#fff}.btn-primary:hover{background:#2a8a52}
.btn-print{background:rgba(255,255,255,.25);color:#fff;border:1.5px solid rgba(255,255,255,.4)}.btn-print:hover{background:rgba(255,255,255,.35)}
.btn-check{background:#2a7a4a;color:#fff}.btn-check:hover{background:#1e5a3a}
.itabs{display:flex;border-bottom:1px solid var(--lt);background:#fafaf7;overflow-x:auto;scrollbar-width:none}
.itabs::-webkit-scrollbar{display:none}
.itab{padding:11px 15px;border:none;background:none;font-size:12px;font-weight:700;color:var(--md);cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;flex-shrink:0}
.itab.active{color:var(--dk);border-bottom-color:var(--gd);font-weight:800}
.tc{padding:18px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
@media(max-width:700px){.igrid{grid-template-columns:1fr}}
.ib{background:linear-gradient(135deg,#f8f7f3,#fafaf7);border-radius:8px;padding:13px;border-left:4px solid var(--gd);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ib .il{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--gd);margin-bottom:5px}
.ib p{font-size:13px;line-height:1.6}.ib .bn{font-size:24px;font-weight:900;color:var(--b1)}
.slist{list-style:none;display:flex;flex-direction:column;gap:8px}
.slist li{display:flex;gap:10px;align-items:flex-start;background:#f8f7f3;border-radius:8px;padding:11px 13px;border-left:3px solid var(--gd)}
.sn{width:24px;height:24px;border-radius:50%;background:var(--gd);color:#1a1a1a;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.slist li p{font-size:13px;line-height:1.6}
.pvtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pvtab{padding:6px 13px;border-radius:18px;border:2px solid var(--lt);background:var(--sf);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;color:var(--md)}
.pvtab.active{background:var(--dk);color:#fff;border-color:var(--dk)}
.pbox{background:#fafaf7;border-radius:8px;padding:14px;border:1px solid var(--lt);overflow:auto;text-align:center;min-height:200px}
.pbox svg{max-width:100%;height:auto;display:block;margin:0 auto}
.pbox img{max-width:100%;height:auto}
.pleg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pli{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--md);background:#fff;padding:5px 10px;border-radius:6px}
.pld{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.pnotes{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.pn{display:flex;gap:8px;font-size:12.5px;color:var(--md);background:#fffbe8;border-radius:6px;padding:8px 10px;border-left:3px solid var(--gd)}
.stbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.stbl th{background:var(--dk);color:#fff;padding:9px 11px;text-align:left;font-size:9px;font-weight:800;text-transform:uppercase}
.stbl td{padding:8px 11px;border-bottom:1px solid var(--lt)}
.stbl tr:nth-child(even) td{background:#fafaf8}
.stbl .pr{color:var(--b1);font-weight:800;text-align:right}.stbl .qty{color:#8a3a0a;font-weight:700}
.stotal{margin-top:12px;background:var(--dk);color:#fff;border-radius:8px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.stotal .tl{font-size:13px}.stotal .tp{font-size:22px;color:var(--gl)}
.tip{background:#fffbe8;border:1px solid #f0d060;border-radius:8px;padding:11px 13px;font-size:12.5px;display:flex;gap:8px;align-items:flex-start;margin-top:10px}
.tip span:first-child{font-size:18px;flex-shrink:0}
@media print{
  body{background:white}
  header,.sidebar,.btabs,.btn{display:none}
  .app{grid-template-columns:1fr;gap:0;padding:0}
  .acard,.welcome,.pgc{page-break-inside:avoid;box-shadow:none;border:1px solid #ddd;margin-bottom:20px}
  .pbox{max-height:none;page-break-inside:avoid}
  .stbl{page-break-inside:avoid}
}
</style>
</head>

const S={activeBase:0,activeApero:null,activeTab:'info',checked:JSON.parse(localStorage.getItem('mc')||'{}')};

function renderSidebar(){
  const el=document.getElementById('SB');

  const b=BASES[S.activeBase];
  const ba=APEROS.filter(a=>b.aperos.includes(a.id));
  const bc=ba.filter(a=>S.checked[a.id]).length;
  el.innerHTML=`
    <div class="bcard" style="background:${b.color}">
      <h2>${b.name}</h2>
      <div class="sub">${b.label}</div>
      <div class="bstats">
        <div class="bst"><div class="v">${b.aperos.length}</div><div class="l">Aperos</div></div>
        <div class="bst"><div class="v">${b.cost}</div><div class="l">Coste</div></div>
        <div class="bst"><div class="v">${b.time}</div><div class="l">Fab.</div></div>
        <div class="bst"><div class="v">${bc}/${b.aperos.length}</div><div class="l">✓</div></div>
      </div>
      <button class="btn btn-print" style="width:100%;margin-top:10px;justify-content:center" onclick="printBase(${b.id})">🖨️ Imprimir Base</button>
    </div>
    <div class="alist">
      <div class="alhdr"><span>Aperos</span></div>
      ${ba.map(ap=>`
        <div class="ai ${S.activeApero===ap.id?'active':''}" onclick="selApero(${ap.id})" style="--ac:${b.color}">

}

  const dtags=['','d1','d2','d3'];
  
  document.getElementById('MN').innerHTML=prog+`
    <div class="acard">
      <div class="achdr" style="background:${b.color}">

function renderTab(ap,b){

      <div class="igrid">

  } else {

        <thead><tr><th>Material</th><th>Medida</th><th style="text-align:right">Precio</th></tr></thead>

function renderProg(){
  const t=APEROS.length,d=APEROS.filter(a=>S.checked[a.id]).length,p=Math.round(d/t*100);
  return `<div class="pgc"><div class="pgl"><span>📊 ${d}/${t} aperos fabricados</span><span>${p}%</span></div><div class="pgb"><div class="pgf" style="width:${p}%"></div></div></div>`;
}

function printBase(id){

  const w=window.open('','PRINT','width=1000');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${b.name}</title><style>

    <p style="margin-top:6px"><strong>Uso:</strong> ${ap.cultivos.substring(0,60)}...</p>

<div style="margin-top:40px;padding-top:20px;border-top:2px solid #ccc;text-align:center;color:#999;font-size:11px">

function sw(i){S.activeBase=i;S.activeApero=null;S.activeTab='info';document.querySelectorAll('.btab').forEach((t,j)=>t.classList.toggle('active',j===i));renderSidebar();renderMain();}
function selApero(id){S.activeApero=id;S.activeTab='info';renderSidebar();renderMain();}
function setTab(t){S.activeTab=t;const ap=APEROS.find(a=>a.id===S.activeApero);if(ap){const b=BASES.find(x=>x.aperos.includes(ap.id));renderTab(ap,b);}}
function toggleChk(id){S.checked[id]=!S.checked[id];save();renderSidebar();renderMain();}

renderSidebar();renderMain();
</script>
