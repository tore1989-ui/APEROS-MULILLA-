<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Aperos — Mulilla 70 cm</title>
<style>
  :root {
    --bg:       #f5f2ec;
    --surface:  #ffffff;
    --dark:     #1a2535;
    --mid:      #4a5568;
    --light:    #e8e4dc;
    --b1:       #1e5a3a;  /* verde oscuro Base 1 */
    --b2:       #1a5a5a;  /* teal Base 2 */
    --b3:       #5a2a0a;  /* terracota Base 3 */
    --b4:       #4a2a6a;  /* púrpura Base 4 */
    --gold:     #c89a2a;
    --gold-l:   #f0c050;
    --done:     #2a7a4a;
    --radius:   10px;
    --shadow:   0 2px 12px rgba(0,0,0,.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }

  /* ── HEADER ── */
  header {
    background:var(--dark);
    padding:0;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 16px rgba(0,0,0,.3);
  }
  .header-inner {
    display:flex; align-items:center; gap:14px;
    padding:12px 20px;
    max-width:1200px; margin:0 auto;
  }
  .logo { font-size:28px; }
  .title-block h1 { font-size:18px; font-weight:700; color:#fff; letter-spacing:-.3px; }
  .title-block p  { font-size:12px; color:#aab; margin-top:1px; }
  .header-actions { margin-left:auto; display:flex; gap:8px; }
  .btn-dl {
    background:var(--gold); color:#111; border:none;
    padding:8px 16px; border-radius:6px; font-weight:700; font-size:13px;
    cursor:pointer; display:flex; align-items:center; gap:6px; transition:.2s;
  }
  .btn-dl:hover { background:var(--gold-l); transform:translateY(-1px); }

  /* ── TABS (Bases) ── */
  .base-tabs {
    background:var(--dark);
    border-top:1px solid rgba(255,255,255,.08);
    display:flex; overflow-x:auto; gap:4px; padding:0 20px;
    max-width:1200px; margin:0 auto;
  }
  .base-tab {
    padding:10px 18px; border:none; background:transparent;
    color:#aab; cursor:pointer; font-size:13px; font-weight:600;
    white-space:nowrap; border-bottom:3px solid transparent;
    transition:.2s; flex-shrink:0;
  }
  .base-tab.b1 { --ac:var(--b1); }
  .base-tab.b2 { --ac:var(--b2); }
  .base-tab.b3 { --ac:var(--b3); }
  .base-tab.b4 { --ac:var(--b4); }
  .base-tab.active { color:#fff; border-bottom-color:var(--ac); }
  .base-tab:hover { color:#fff; }

  /* ── LAYOUT ── */
  .app { max-width:1200px; margin:0 auto; padding:20px; display:grid; grid-template-columns:300px 1fr; gap:20px; }
  @media(max-width:768px){ .app { grid-template-columns:1fr; } }

  /* ── SIDEBAR ── */
  .sidebar { display:flex; flex-direction:column; gap:12px; }
  .base-info-card {
    border-radius:var(--radius); padding:16px; color:#fff;
    box-shadow:var(--shadow);
  }
  .base-info-card h2 { font-size:22px; font-weight:800; }
  .base-info-card p  { font-size:12px; opacity:.85; margin-top:4px; }
  .base-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
  .stat { background:rgba(255,255,255,.15); border-radius:6px; padding:8px; text-align:center; }
  .stat .val { font-size:18px; font-weight:800; }
  .stat .lbl { font-size:10px; opacity:.8; margin-top:2px; }

  .apero-list { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .apero-list-header {
    padding:12px 16px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.8px; color:var(--mid);
    border-bottom:1px solid var(--light);
    display:flex; justify-content:space-between; align-items:center;
  }
  .check-all { font-size:11px; color:var(--gold); cursor:pointer; font-weight:600; border:none; background:none; }
  .apero-item {
    display:flex; align-items:center; gap:12px;
    padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--light);
    transition:.15s; position:relative;
  }
  .apero-item:last-child { border-bottom:none; }
  .apero-item:hover { background:#f8f7f4; }
  .apero-item.active { background:#f0faf4; }
  .apero-item.active::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--accent,var(--b1)); border-radius:0 3px 3px 0;
  }
  .apero-check {
    width:20px; height:20px; border-radius:50%;
    border:2px solid #ccc; flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:.2s; background:#fff;
  }
  .apero-check.checked { background:var(--done); border-color:var(--done); }
  .apero-check.checked::after { content:'✓'; color:#fff; font-size:11px; font-weight:800; }
  .apero-name { flex:1; font-size:13px; font-weight:600; }
  .apero-num { font-size:10px; font-weight:700; color:#fff; background:var(--accent,var(--b1)); padding:2px 6px; border-radius:10px; flex-shrink:0; }

  /* ── MAIN PANEL ── */
  .main-panel { display:flex; flex-direction:column; gap:16px; }

  /* Welcome screen */
  .welcome {
    background:var(--surface); border-radius:var(--radius); padding:40px;
    text-align:center; box-shadow:var(--shadow);
  }
  .welcome .icon { font-size:56px; margin-bottom:16px; }
  .welcome h2 { font-size:24px; font-weight:800; margin-bottom:8px; }
  .welcome p  { color:var(--mid); font-size:14px; max-width:400px; margin:0 auto; }

  /* Progress bar */
  .progress-card { background:var(--surface); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; font-weight:600; margin-bottom:8px; }
  .progress-bar { height:8px; background:var(--light); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--b1),var(--b2)); border-radius:4px; transition:.4s; }

  /* Apero detail card */
  .apero-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .apero-card-header {
    padding:20px 24px; color:#fff;
    display:flex; align-items:flex-start; gap:14px;
  }
  .apero-card-header .icon { font-size:36px; flex-shrink:0; }
  .apero-card-header h2 { font-size:22px; font-weight:800; margin-bottom:4px; }
  .apero-card-header .base-tag {
    display:inline-block; background:rgba(255,255,255,.2);
    padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600;
  }
  .apero-card-header .check-btn {
    margin-left:auto; flex-shrink:0;
    background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.4);
    color:#fff; padding:8px 16px; border-radius:6px;
    cursor:pointer; font-weight:700; font-size:13px; transition:.2s;
    white-space:nowrap;
  }
  .apero-card-header .check-btn.done { background:var(--done); border-color:var(--done); }
  .apero-card-header .check-btn:hover { background:rgba(255,255,255,.35); }

  /* Tabs inside apero */
  .apero-tabs { display:flex; border-bottom:1px solid var(--light); padding:0 24px; background:#fafaf8; }
  .apero-tab {
    padding:12px 18px; border:none; background:none;
    font-size:13px; font-weight:600; color:var(--mid);
    cursor:pointer; border-bottom:3px solid transparent;
    transition:.2s; white-space:nowrap;
  }
  .apero-tab.active { color:var(--dark); border-bottom-color:var(--gold); }

  .apero-tab-content { padding:24px; }

  /* Info sections */
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  @media(max-width:600px){ .info-grid { grid-template-columns:1fr; } }
  .info-block { background:#f8f7f4; border-radius:8px; padding:14px; border-left:4px solid var(--gold); }
  .info-block .lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--gold); margin-bottom:6px; }
  .info-block p { font-size:14px; line-height:1.5; color:var(--dark); }

  .steps-list { list-style:none; display:flex; flex-direction:column; gap:10px; }
  .steps-list li {
    display:flex; gap:12px; align-items:flex-start;
    background:#f8f7f4; border-radius:8px; padding:12px 14px;
  }
  .step-num {
    width:24px; height:24px; border-radius:50%;
    background:var(--gold); color:#111; font-weight:800; font-size:12px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;
  }
  .steps-list li p { font-size:14px; line-height:1.5; }

  /* SVG Plan */
  .plan-container { background:#fafaf8; border-radius:8px; padding:16px; border:1px solid var(--light); overflow:auto; }
  .plan-container svg { max-width:100%; height:auto; display:block; margin:0 auto; }
  .plan-notes { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .plan-note { display:flex; gap:8px; align-items:flex-start; font-size:13px; color:var(--mid); }
  .plan-note::before { content:'⚑'; color:var(--gold); flex-shrink:0; }

  /* Shopping list */
  .shop-table { width:100%; border-collapse:collapse; font-size:13px; }
  .shop-table th { background:var(--dark); color:#fff; padding:10px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .shop-table td { padding:9px 12px; border-bottom:1px solid var(--light); }
  .shop-table tr:nth-child(even) td { background:#fafaf8; }
  .shop-table tr.total td { background:var(--dark); color:#fff; font-weight:700; }
  .shop-table .price { color:var(--b1); font-weight:700; text-align:right; }
  .shop-table .qty   { color:var(--b3); font-weight:600; }
  .shop-total-bar {
    margin-top:12px; background:var(--dark); color:#fff; border-radius:8px;
    padding:14px 18px; display:flex; justify-content:space-between; align-items:center;
  }
  .shop-total-bar .total-label { font-size:14px; font-weight:600; }
  .shop-total-bar .total-price { font-size:22px; font-weight:800; color:var(--gold-l); }

  /* Base overview */
  .base-overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-bottom:20px; }
  .base-card {
    border-radius:var(--radius); padding:18px; color:#fff; cursor:pointer;
    transition:.2s; box-shadow:var(--shadow);
  }
  .base-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.18); }
  .base-card h3 { font-size:20px; font-weight:800; }
  .base-card .sub { font-size:11px; opacity:.8; margin-top:2px; }
  .base-card .apero-count { margin-top:12px; font-size:28px; font-weight:800; }
  .base-card .apero-count span { font-size:13px; font-weight:400; opacity:.8; }

  /* Tips section */
  .tip { background:#fffbe8; border:1px solid #f0d060; border-radius:8px; padding:12px 14px; font-size:13px; display:flex; gap:10px; align-items:flex-start; }
  .tip-icon { font-size:18px; flex-shrink:0; }

  /* Checklist summary */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .summary-item { background:var(--surface); border-radius:8px; padding:12px; box-shadow:var(--shadow); display:flex; gap:10px; align-items:center; }
  .summary-item .s-check { width:22px; height:22px; border-radius:50%; background:#e0e0e0; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; }
  .summary-item .s-check.done { background:var(--done); color:#fff; }
  .summary-item .s-name { font-size:12px; font-weight:600; }
  .summary-item .s-base { font-size:10px; color:var(--mid); }

  .hidden { display:none !important; }
  .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .tag.dif1 { background:#e8f5e9; color:#2a7a4a; }
  .tag.dif2 { background:#fff8e1; color:#8a6a00; }
  .tag.dif3 { background:#fbe9e7; color:#8a2a0a; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🚜</div>

      <h1>Sistema de Aperos — Mulilla 70 cm</h1>
      <p>4 bases · 15 aperos · Planos + Lista de compra por apero</p>
    </div>
    <div class="header-actions">
      <button class="btn-dl" onclick="downloadApp()">⬇ Descargar app</button>
    </div>
  </div>
  <div style="max-width:1200px;margin:0 auto;display:flex;">
    <div class="base-tabs" id="baseTabs">
      <button class="base-tab b1 active" onclick="switchBase(0)">🌱 Base 1 — Suelo + Ajos</button>
      <button class="base-tab b2" onclick="switchBase(1)">🧹 Base 2 — Acabado</button>
      <button class="base-tab b3" onclick="switchBase(2)">⚙️ Base 3 — Peso</button>
      <button class="base-tab b4" onclick="switchBase(3)">🪑 Base 4 — Sulky</button>
      <button class="base-tab" style="--ac:#888" onclick="switchBase(4)">📋 Resumen</button>
    </div>
  </div>
</header>

<div class="app" id="appRoot">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar"></div>
  <!-- Main -->
  <div class="main-panel" id="mainPanel"></div>
</div>

<script>

function svgWrap(content, h=420){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 ${h}" style="font-family:monospace,sans-serif">
    <rect width="760" height="${h}" fill="#fafaf8" rx="8"/>
    ${content}
  </svg>`;
}
const DIM = '#a03030'; const BLU = '#1e5a3a'; const STEEL_C = '#6a8090';
const DARK_C = '#1a2535'; const YEL = '#c89a2a'; const GND = '#8a6a45';

function gndRect(x,y,w,h=28){ return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#c3a06e" stroke="${GND}" stroke-width="1.5"/>` + Array.from({length:Math.floor(w/12)},(_,i)=>`<line x1="${x+i*12}" y1="${y}" x2="${x+i*12-16}" y2="${y+h}" stroke="${GND}" stroke-width="0.8" opacity="0.6"/>`).join(''); }
function lbl(x,y,txt,col='#fff',bg='#1e5a3a',pad=5){
  const lines=txt.split('\n');
  const mw=lines.reduce((a,l)=>Math.max(a,l.length*6.5),0);
  const th=lines.length*16+pad*2;
  return `<rect x="${x-pad}" y="${y-pad}" width="${mw+pad*2}" height="${th}" fill="${bg}" rx="4" opacity="0.95"/>
    ${lines.map((l,i)=>`<text x="${x}" y="${y+12+i*16}" font-size="11" fill="${col}">${l}</text>`).join('')}`;
}
function dimLine(x1,y1,x2,y2,txt,side='top'){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const isH=y1===y2;
  const off=side==='top'?-13:11;
  const dx=isH?0:4, dy=isH?off:0;
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${DIM}" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
    <text x="${mx+dx}" y="${my+dy}" font-size="11" fill="${DIM}" text-anchor="middle" font-weight="600">${txt}</text>`;
}
const ARROW_DEF = `<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${DIM}"/></marker></defs>`;

function getCheckedCount() {
  return APEROS.filter(a => state.checked[a.id]).length;
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  if (state.activeBase === 4) { el.innerHTML=''; return; }
  const base = BASES[state.activeBase];
  const baseAperos = APEROS.filter(a => a.base === state.activeBase);
  const checkedInBase = baseAperos.filter(a => state.checked[a.id]).length;

  el.innerHTML = `
    <div class="base-info-card" style="background:${base.color}">
      <h2>${base.name}</h2>
      <p>${base.label}</p>
      <div class="base-stats">
        <div class="stat"><div class="val">${base.aperos}</div><div class="lbl">Aperos</div></div>
        <div class="stat"><div class="val">${base.cost}</div><div class="lbl">Coste total</div></div>
        <div class="stat"><div class="val">${base.time}</div><div class="lbl">Fabricación</div></div>
        <div class="stat"><div class="val">${checkedInBase}/${base.aperos}</div><div class="lbl">Fabricados ✓</div></div>
      </div>
    </div>
    <div class="apero-list">
      <div class="apero-list-header">
        <span>Aperos de esta base</span>
        <button class="check-all" onclick="toggleAllBase(${state.activeBase})">Marcar todos</button>
      </div>
      ${baseAperos.map(ap=>`
        <div class="apero-item ${state.activeApero===ap.id?'active':''}" onclick="selectApero(${ap.id})" style="--accent:${base.color}">
          <div class="apero-check ${state.checked[ap.id]?'checked':''}" onclick="event.stopPropagation();toggleCheck(${ap.id})"></div>
          <span class="apero-name">${ap.icon} ${ap.name}</span>
          <span class="apero-num" style="background:${base.color}">${ap.id}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderProgress() {
  const total = APEROS.length;
  const done = getCheckedCount();
  const pct = Math.round(done/total*100);
  return `
    <div class="progress-card">
      <div class="progress-label">
        <span>📊 Progreso total del sistema</span>
        <span>${done}/${total} aperos fabricados (${pct}%)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

function renderMain() {
  const el = document.getElementById('mainPanel');
  // Progress always on top
  const prog = renderProgress();

  if (state.activeBase === 4) {
    // Summary view
    const total = APEROS.length; const done = getCheckedCount();
    el.innerHTML = prog + `

        <div class="apero-card-header" style="background:#1a2535">

        </div>

              </div>
            `}).join('')}
          </div></div>
        </div>
      </div>

    return;
  }

  if (!state.activeApero) {
    const base = BASES[state.activeBase];

      <div class="welcome">
        <div class="icon">👈</div>
        <h2>${base.name} — ${base.label}</h2>

  const ap = APEROS.find(a=>a.id===state.activeApero);
  const base = BASES[ap.base];
  const difs = ['','★☆☆☆ Fácil','★★☆☆ Medio','★★★☆ Avanzado'];
  const difTags = ['','dif1','dif2','dif3'];

  el.innerHTML = prog + `

      <div class="apero-card-header" style="background:${base.color}">
        <div class="icon">${ap.icon}</div>
        <div>
          <h2>Apero ${ap.id} — ${ap.name}</h2>
          <span class="base-tag">${base.name} · ${base.label}</span>
          <span class="tag ${difTags[ap.dif]}" style="margin-left:8px">${difs[ap.dif]}</span>
        </div>
        <button class="check-btn ${state.checked[ap.id]?'done':''}" onclick="toggleCheck(${ap.id})">
          ${state.checked[ap.id]?'✓ Fabricado':'Marcar como fabricado'}
        </button>
      </div>
      <div class="apero-tabs">
        ${['info','plano','compra'].map(t=>`
          <button class="apero-tab ${state.activeTab===t?'active':''}" onclick="setTab('${t}')">
            ${{info:'📖 Información',plano:'📐 Plano técnico',compra:'🛒 Lista de la compra'}[t]}

      <div class="apero-tab-content" id="tabContent"></div>
    </div>
  `;

  renderTab(ap, base);
}

function renderTab(ap, base) {
  const el = document.getElementById('tabContent');
  if (!el) return;

  if (state.activeTab === 'info') {
    const costTotal = ap.shop.reduce((sum,r)=>{
      const match = r[2].match(/~([\d,]+)/);
      return sum + (match ? parseFloat(match[1].replace(',','.')) : 0);
    }, 0);
    el.innerHTML = `
      <div class="info-grid">
        <div class="info-block"><div class="lbl">Para qué sirve</div><p>${ap.uso}</p></div>
        <div class="info-block"><div class="lbl">Cuándo usarlo</div><p>${ap.cuando}</p></div>
        <div class="info-block"><div class="lbl">Cultivos ideales</div><p>${ap.cultivos}</p></div>
        <div class="info-block"><div class="lbl">Coste estimado</div><p style="font-size:22px;font-weight:800;color:var(--b1)">${ap.cost}</p></div>
      </div>
      <div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">Cómo usarlo paso a paso:</div>
        <ul class="steps-list">
          ${ap.como.map((s,i)=>`<li><div class="step-num">${i+1}</div><p>${s}</p></li>`).join('')}
        </ul>
      </div>
      ${ap.notes.map(n=>`<div class="tip"><div class="tip-icon">⚑</div><div>${n}</div></div>`).join('')}
    `;
  } else if (state.activeTab === 'plano') {
    el.innerHTML = `
      <div style="margin-bottom:16px">
        <div class="plan-container">${ap.svgPlan()}</div>
      </div>
      <div class="plan-notes">
        ${ap.notes.map(n=>`<div class="plan-note">${n}</div>`).join('')}
      </div>
      <div class="tip" style="margin-top:12px">
        <div class="tip-icon">💡</div>
        <div>Este plano está a escala orientativa. Todas las medidas exactas están en la <strong>Lista de la compra</strong> (siguiente pestaña).</div>
      </div>
    `;
  } else {
    let total = 0;
    ap.shop.forEach(r=>{ const m=r[2].match(/~([\d,]+)/); if(m) total+=parseFloat(m[1].replace(',','.')); });
    el.innerHTML = `
      <div style="margin-bottom:16px">
        <table class="shop-table">
          <thead><tr><th>Material / Pieza</th><th>Cantidad</th><th class="price">Precio</th><th>Dónde comprar</th></tr></thead>
          <tbody>
            ${ap.shop.map(r=>`<tr><td>${r[0]}</td><td class="qty">${r[1]}</td><td class="price">${r[2]}</td><td>${r[3]}</td></tr>`).join('')}
          </tbody>
        </table>
        <div class="shop-total-bar">
          <div class="total-label">💰 Total estimado para fabricar este apero</div>
          <div class="total-price">${ap.cost}</div>
        </div>
      </div>
      <div class="tip">
        <div class="tip-icon">💡</div>
        <div>Comprar el acero en almacén de hierros es hasta un 40% más barato que en ferretería de barrio. Los pasadores Ø16mm: pedir en lote de 10-20 en tornillería industrial (~0,50€/ud).</div>
      </div>
    `;
  }
}

// ═══════════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════════

function switchBase(idx) {
  state.activeBase = idx;
  state.activeApero = null;
  state.activeTab = 'info';
  document.querySelectorAll('.base-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderSidebar();
  renderMain();
}

function selectApero(id) {
  state.activeApero = id;
  state.activeTab = 'info';
  renderSidebar();
  renderMain();
}

function setTab(tab) {
  state.activeTab = tab;
  const ap = APEROS.find(a=>a.id===state.activeApero);
  const base = BASES[ap.base];
  renderTab(ap, base);
  document.querySelectorAll('.apero-tab').forEach(t=>t.classList.toggle('active',t.textContent.includes({info:'Información',plano:'Plano',compra:'compra'}[tab])));
}

function toggleCheck(id) {
  state.checked[id] = !state.checked[id];
  saveState();
  renderSidebar();
  renderMain();
}

function toggleAllBase(baseIdx) {
  const baseAperos = APEROS.filter(a=>a.base===baseIdx);
  const allChecked = baseAperos.every(a=>state.checked[a.id]);
  baseAperos.forEach(a=>{ state.checked[a.id] = !allChecked; });
  saveState();
  renderSidebar();
  renderMain();
}

function downloadApp() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aperos_mulilla.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── INIT ──
renderSidebar();
renderMain();
